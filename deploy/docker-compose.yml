# deploy/docker-compose.yml — image tag injected via $IMAGE_TAG env var
# (deploy.sh exports it before invoking compose).
#
# Inference source is models/test_video.mp4 (the same 15-s clip students
# carried into HW5 from Lab 9). Mirrors HW5's container-runs-inference
# pattern. Real-camera deployment via gstreamer/nvarguscamerasrc is
# documented in docs/ARCHITECTURE.md as a Part F production note —
# inference_node.py already supports `--source csi:N` for that path; just
# add a `command:` override and a `devices:` mapping to switch to it.
services:
  inference:
    image: ghcr.io/jlsung-ttu/edgeai-hw6:${IMAGE_TAG}
    runtime: nvidia
    restart: unless-stopped
    network_mode: host        # so /healthz on :8000 is reachable from the deploy host
    volumes:
      - lab12-models:/opt/models
      # The test video carried from HW5 / Lab 9. Mounted read-only so
      # multiple deploys can't accidentally truncate the source file.
      # inference_node's --source default is /opt/data/test_video.mp4,
      # and the loop seeks back to frame 0 on EOF — so a 15-s clip plays
      # forever and the container stays alive for the deploy healthcheck.
      # Relative path is resolved against THIS file's directory (deploy/),
      # so `../models/...` reaches models/ at the repo root.
      - ../models/test_video.mp4:/opt/data/test_video.mp4:ro
      # /healthz reads these two files directly to report the LIVE power
      # mode. We can't run `nvpmodel -q` inside the container because the
      # binary hardcodes /proc/device-tree/compatible, and procfs paths
      # cannot be bind-mounted at runtime. Reading the runtime status
      # file + cross-referencing the conf for the NAME is equivalent and
      # works without privileged mode.
      - /var/lib/nvpmodel/status:/var/lib/nvpmodel/status:ro
      - /etc/nvpmodel.conf:/etc/nvpmodel.conf:ro
    environment:
      MQTT_BROKER: localhost
      MODEL_VERSION: ${IMAGE_TAG}
    # Use the Dockerfile's default CMD — inference_node's --source
    # default is /opt/data/test_video.mp4, which the bind-mount above
    # populates. No command: override needed for the file-based path.
volumes:
  lab12-models:
    external: true            # carried over from Lab 12 — engine cache persists
