# deploy/docker-compose.yml — image tag injected via $IMAGE_TAG env var
# (deploy.sh exports it before invoking compose).
services:
  inference:
    image: ghcr.io/jlsung-ttu/edgeai-hw6:${IMAGE_TAG}
    runtime: nvidia
    restart: unless-stopped
    network_mode: host        # so /healthz on :8000 is reachable from the deploy host
    devices:
      - /dev/video0:/dev/video0     # IMX219 camera passthrough — adjust if your camera is on /dev/video1, /dev/video2, etc.
    volumes:
      - lab12-models:/opt/models
      # /healthz reads these two files directly to report the LIVE power
      # mode. We can't run `nvpmodel -q` inside the container because the
      # binary hardcodes /proc/device-tree/compatible, and procfs paths
      # cannot be bind-mounted at runtime. Reading the runtime status
      # file + cross-referencing the conf for the NAME is equivalent and
      # works without privileged mode.
      - /var/lib/nvpmodel/status:/var/lib/nvpmodel/status:ro
      - /etc/nvpmodel.conf:/etc/nvpmodel.conf:ro
    environment:
      MQTT_BROKER: localhost
      MODEL_VERSION: ${IMAGE_TAG}
    # Override the Dockerfile's CMD to use the IMX219 CSI camera via the
    # nvarguscamerasrc gstreamer pipeline. `csi:0` is parsed by
    # open_video_source() and turned into the right pipeline + backend.
    # The default V4L2 path (`--source 0`) silently fails on IMX219 — it
    # opens /dev/video0 but cap.read() times out because there's no V4L2
    # stream. Use `csi:N` for CSI cameras, `0` for USB webcams, a path
    # for files.
    command: ["python3", "-m", "src.inference_node", "--source", "csi:0"]
volumes:
  lab12-models:
    external: true            # carried over from Lab 12 — engine cache persists
