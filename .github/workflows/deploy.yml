# .github/workflows/deploy.yml — tag-triggered deploy
# Triggers: push of v*.*.* tag (annotated)
# Jobs: deploy (with production environment + approval gate)
#
# Pattern: self-hosted Jetson runner (case-II from the FAQ — works for
# NAT'd Jetsons that aren't reachable from the public internet). The
# alternative SSH-from-cloud pattern (`runs-on: ubuntu-latest` +
# appleboy/ssh-action) is documented in the FAQ for Jetsons that DO have
# inbound public connectivity. Both are graded equivalently — pick the
# one that matches your network setup.
name: Deploy

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR (so deploy.sh's docker pull works)
        # Even though the Jetson's interactive sessions periodically
        # docker-login by hand, the runner's exec env is a fresh shell
        # without that cached credential. Re-authenticate per run with
        # the workflow's auto-injected GITHUB_TOKEN.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx (for imagetools)
        uses: docker/setup-buildx-action@v4

      - name: Re-tag the SHA image as semver (no rebuild)
        # docker buildx imagetools create just rewrites manifest references,
        # so flipping vX.Y.Z / vX.Y / vX / latest takes <5 s with no pull.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SRC="ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}"
          MAJ="${TAG%%.*}"
          MIN="${TAG%.*}"
          for NEW in "$TAG" "$MIN" "$MAJ" "latest"; do
            echo "Tagging $NEW from $SRC"
            docker buildx imagetools create -t "ghcr.io/${{ github.repository }}:${NEW}" "$SRC"
          done

      - name: Run deploy.sh on this Jetson
        # The runner already lives on the Jetson, so deploy.sh runs
        # locally — no SSH required. nvpmodel + jetson_clocks have
        # NOPASSWD sudo (Step 0.0); STATE_DIR is chowned to the runner
        # user (D5); GHCR is logged in by the step above.
        env:
          DEPLOY_ENV: production
        run: |
          chmod +x deploy/deploy.sh deploy/healthcheck.sh
          bash deploy/deploy.sh "${{ github.ref_name }}"
