# Homework 6 — five-stage CI pipeline
# Triggers: push (any branch), pull_request → main, workflow_dispatch
# Jobs:     lint → (test, security-scan) → build → integration-test
#
# Job graph (visualizes the `needs:` declarations below):
#
#         lint
#          │
#     ┌────┴────┐
#     ▼         ▼
#   test    security-scan
#     │         │
#     └────┬────┘
#          ▼
#        build
#          │
#          ▼
#   integration-test     (only on push to main; runs on self-hosted Jetson)
#
# Required status checks for branch protection (set in repo Settings → Branches):
#   - "Ruff lint"
#   - "Pytest + coverage"
#   - "Bandit + pip-audit"
#   - "Build & push ARM64 image"
#   - "Integration test (Jetson)"

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write       # required for the build job's GHCR push

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1 — lint
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        # --output-format=github surfaces failures as inline PR annotations
        run: ruff check . --output-format=github

  # ─────────────────────────────────────────────────────────────────
  # Stage 2a — pytest with coverage gate
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install test deps
        # We deliberately don't pip-install all of requirements.txt — the
        # Jetson torch wheel doesn't exist on x86 (it's CUDA+aarch64 only).
        # We DO install cv2 and paho-mqtt because src/inference_node.py
        # imports them at module level — without them, even importing the
        # test file fails with ModuleNotFoundError. Unit tests then mock
        # the actual cv2/paho behavior.
        run: |
          pip install \
            pytest==8.3.3 \
            pytest-cov==5.0.0 \
            pytest-mock==3.14.0 \
            opencv-python==4.10.0.84 \
            paho-mqtt==2.1.0

      - name: Run pytest with coverage gate (≥90%)
        # --ignore=tests/integration: those tests need docker + GPU and
        # only run on the Jetson runner (integration-test job below).
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=90 \
            -v

      - name: Upload coverage report
        # if: always() so the artifact uploads even when the test job
        # fails — useful for diagnosing why coverage dropped
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-html
          path: htmlcov/

  # ─────────────────────────────────────────────────────────────────
  # Stage 2b — security scan (parallel with test)
  # ─────────────────────────────────────────────────────────────────
  security-scan:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install scanners
        run: pip install bandit==1.7.10 pip-audit==2.7.3

      - name: Bandit (Python SAST)
        # -ll = report Low and above; -r = recursive
        run: bandit -r src/ -ll

      - name: pip-audit (CVE scan on pinned deps)
        # --strict turns warnings into errors. Any CVE in any direct or
        # transitive dep fails the job.
        run: pip-audit --strict -r requirements.txt

  # ─────────────────────────────────────────────────────────────────
  # Stage 3 — multi-arch ARM64 build + push to GHCR
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build & push ARM64 image
    runs-on: ubuntu-latest
    needs: [test, security-scan]    # gated on BOTH stage-2 jobs
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # Stage 4 — integration test on the Jetson (main pushes only)
  # ─────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration test (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: build
    # PRs don't get to touch the real Jetson — the build job already
    # validated the image cross-compiles. Only main pushes run this.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR on Jetson
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and verify image on this Jetson
        # Part C will replace this with a real pytest E2E test under
        # tests/integration/. For now (Part A wiring), just prove the
        # image pulls and the entrypoint reaches the engine-ready signal.
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}"
          echo "Pulling $IMAGE"
          docker pull "$IMAGE"
          docker volume create lab12-models
          docker run --rm --runtime nvidia -v lab12-models:/opt/models \
            "$IMAGE" python3 -c "
          from ultralytics import YOLO
          m = YOLO('/opt/models/best.engine', task='detect')
          print('PASS: engine loads on Jetson hardware')
          "
